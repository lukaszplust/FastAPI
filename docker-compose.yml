version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chat_ai_postgres
    restart: always
    environment:
      POSTGRES_USER=${POSTGRES_USER}
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend # scieżka do folderu Dockerfile backendu
    container_name: chat_ai_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # wewnątrz sieci Dockera baza nie nazywa się 'localhost', tylko 'db'
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db  # docker najpierw odpali bazę, potem backend

volumes:
  postgres_data: